<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>傲虎走访 · 访谈记录卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f5f4ef; --paper2:#efeee8;
    --card:#ffffff; --card2:#fcfbf8;
    --ink:#1b1c19; --ink2:#3c3d38; --muted:#6d6f68; --faint:#9b9d95;
    --line:#e4e2d9; --line2:#edeae1;

    --gold:#9c7416;  --gold-soft:#f4ecd8;
    --teal:#137a6d;  --teal-soft:#daefe9;
    --steel:#33639f; --steel-soft:#dde9f5;
    --sage:#4f7d3f;  --sage-soft:#e2efd9;
    --plum:#8a4f86;  --plum-soft:#efe0ee;
    --gray:#8a8b84;  --gray-soft:#ecebe5;
    --navy:#445a78;  --navy-soft:#e1e7ef;
    --danger:#b8442b;

    --shadow:0 1px 2px rgba(40,38,30,.05), 0 10px 28px rgba(40,38,30,.08);
    --shadow-sm:0 1px 2px rgba(40,38,30,.05);
    --topH:54px; --navH:60px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper2);color:var(--ink);font-family:"Noto Sans SC",sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  input,textarea,button,select{font-family:inherit}

  .ic{width:1em;height:1em;display:inline-block;vertical-align:-0.13em;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:none}

  /* ---- app shell ---- */
  .app{max-width:540px;margin:0 auto;min-height:100vh;background:var(--paper);position:relative;
       box-shadow:0 0 0 1px var(--line), 0 24px 60px rgba(40,38,30,.10)}

  /* color helpers */
  .c-gold{--c:var(--gold);--cs:var(--gold-soft)} .c-teal{--c:var(--teal);--cs:var(--teal-soft)}
  .c-steel{--c:var(--steel);--cs:var(--steel-soft)} .c-sage{--c:var(--sage);--cs:var(--sage-soft)}
  .c-plum{--c:var(--plum);--cs:var(--plum-soft)} .c-gray{--c:var(--gray);--cs:var(--gray-soft)}
  .c-navy{--c:var(--navy);--cs:var(--navy-soft)}

  /* ---- top bar ---- */
  .top{position:sticky;top:0;z-index:30;height:var(--topH);background:rgba(245,244,239,.9);backdrop-filter:blur(12px);
       border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 14px}
  .top .mk{font-family:"JetBrains Mono",monospace;font-size:9.5px;color:var(--gold);border:1px solid var(--line);border-radius:5px;padding:3px 6px;letter-spacing:.04em;background:var(--gold-soft);white-space:nowrap}
  .top .ttl{font-family:"Noto Serif SC",serif;font-weight:700;font-size:14.5px;line-height:1.1}
  .top .ttl small{display:block;font-family:"JetBrains Mono",monospace;font-weight:400;font-size:9px;color:var(--faint);letter-spacing:.02em;margin-top:1px}
  .top .sp{flex:1}
  .iconbtn{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--ink2);
           display:grid;place-items:center;cursor:pointer;font-size:18px;transition:.15s;flex:none}
  .iconbtn:active{transform:scale(.94)} .iconbtn:hover{border-color:var(--muted)}

  /* ---- session meta strip ---- */
  .meta{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--card2);border-bottom:1px solid var(--line2)}
  .meta .mlab{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);flex:none}
  .meta input{flex:1;min-width:0;border:none;background:transparent;font-size:13px;color:var(--ink);outline:none;padding:2px 0;font-weight:500}
  .meta input::placeholder{color:var(--faint);font-weight:400}
  .meta .mdiv{width:1px;align-self:stretch;background:var(--line);margin:2px 0}
  .meta input.mdate{flex:0 0 122px;font-family:"JetBrains Mono",monospace;font-size:12px}

  /* ---- panels / tabs ---- */
  .panel-view{display:none;padding:14px 14px calc(var(--navH) + 26px)}
  .panel-view.on{display:block}

  /* ---- role selector (horizontal scroll) ---- */
  .rolescroll{position:sticky;top:var(--topH);z-index:20;margin:0 -14px 14px;padding:11px 14px;background:rgba(245,244,239,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
              display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
  .rolescroll::-webkit-scrollbar{display:none}
  .rchip{flex:none;display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:12px;
         padding:8px 12px 8px 9px;cursor:pointer;transition:.15s;position:relative}
  .rchip:active{transform:scale(.97)}
  .rchip .ri{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:17px;color:var(--c);background:var(--cs);flex:none}
  .rchip .rt{line-height:1.15}
  .rchip .rn{font-family:"Noto Serif SC",serif;font-weight:700;font-size:13.5px;white-space:nowrap}
  .rchip .rc{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--faint);letter-spacing:.04em;margin-top:1px}
  .rchip .rprog{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);font-weight:500;white-space:nowrap;padding-left:2px}
  .rchip.sel{border-color:var(--c);box-shadow:0 0 0 1.5px var(--c)}
  .rchip.sel .rn{color:var(--c)}
  .rchip.done .rprog{color:var(--teal)}

  /* ---- role heading ---- */
  .rolehead{display:flex;align-items:flex-start;gap:12px;padding:2px 2px 16px;border-bottom:1px solid var(--line);margin-bottom:16px}
  .rolehead .rh-ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:22px;color:var(--c);background:var(--cs);flex:none}
  .rolehead>div{flex:1;min-width:0}
  .rolehead .rh-k{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .rolehead .rh-k .badge{color:var(--c);background:var(--cs);border-radius:20px;padding:1px 8px;letter-spacing:.04em}
  .rolehead h2{font-family:"Noto Serif SC",serif;font-size:21px;font-weight:700;line-height:1.2;margin:3px 0 2px}
  .rolehead .rh-s{font-size:12.5px;color:var(--muted)}

  /* ---- question card ---- */
  .qcard{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--c);border-radius:13px;padding:14px 15px;box-shadow:var(--shadow-sm);margin-bottom:12px;transition:.18s}
  .qcard.starred{box-shadow:0 0 0 1.5px rgba(156,116,22,.5),var(--shadow-sm)}
  .qcard.answered{border-left-color:var(--teal)}
  .qcard .qtop{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .qnum{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600;color:var(--c);background:var(--cs);border-radius:7px;padding:3px 8px;flex:none}
  .qcard.answered .qnum{color:var(--teal);background:var(--teal-soft)}
  .demo-badge{font-family:"JetBrains Mono",monospace;font-size:9.5px;font-weight:600;letter-spacing:.05em;color:var(--steel);background:var(--steel-soft);border-radius:20px;padding:3px 9px;display:inline-flex;align-items:center;gap:5px}
  .demo-badge .ic{font-size:12px}
  .qtop .sp{flex:1}
  .starbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--faint);display:grid;place-items:center;cursor:pointer;font-size:16px;flex:none;transition:.15s}
  .starbtn:active{transform:scale(.9)}
  .starbtn.on{color:var(--gold);background:var(--gold-soft);border-color:transparent}
  .qtext{font-size:15px;line-height:1.55;color:var(--ink);text-wrap:pretty;font-weight:500}
  .qhint{margin-top:8px;font-size:11.5px;color:var(--muted);background:var(--cs);border-radius:8px;padding:6px 10px;display:flex;align-items:flex-start;gap:7px;line-height:1.45}
  .qhint .ic{color:var(--c);font-size:13px;margin-top:1px;flex:none}
  .qnote{margin-top:11px}
  .qnote textarea{width:100%;border:1px solid var(--line);border-radius:9px;background:var(--card2);color:var(--ink);
       font-size:14px;line-height:1.6;padding:10px 12px;resize:none;min-height:46px;outline:none;overflow:hidden;transition:.15s}
  .qnote textarea:focus{border-color:var(--c);background:var(--card)}
  .qnote textarea::placeholder{color:var(--faint)}

  /* ---- stopwatch ---- */
  .sw{display:flex;align-items:center;gap:9px;margin-top:11px;padding:9px 11px;background:var(--steel-soft);border-radius:10px}
  .sw .swt{font-family:"JetBrains Mono",monospace;font-size:21px;font-weight:600;color:var(--steel);letter-spacing:.02em;font-variant-numeric:tabular-nums;flex:1}
  .sw .swt.run{color:var(--danger)}
  .sw button{border:none;border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .sw button:active{transform:scale(.94)}
  .sw .swgo{background:var(--steel);color:#fff} .sw .swgo.pause{background:var(--danger)}
  .sw .swrs{background:var(--card);color:var(--muted);border:1px solid var(--line)}
  .sw .ic{font-size:14px}

  /* ---- checklist ---- */
  .secthead{display:flex;align-items:flex-start;gap:12px;padding:2px 2px 14px;margin-bottom:6px}
  .secthead .sh-ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:22px;color:var(--gold);background:var(--gold-soft);flex:none}
  .secthead>div{flex:1;min-width:0}
  .secthead .sh-k{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase}
  .secthead h2{font-family:"Noto Serif SC",serif;font-size:21px;font-weight:700;line-height:1.2;margin:3px 0 2px}
  .secthead .sh-s{font-size:12.5px;color:var(--muted);line-height:1.5;text-wrap:pretty}

  .ckgroup{margin-bottom:16px}
  .ckg-head{display:flex;align-items:center;gap:8px;margin:0 2px 9px}
  .ckg-tier{font-family:"JetBrains Mono",monospace;font-size:9.5px;font-weight:600;letter-spacing:.04em;color:var(--c);background:var(--cs);border-radius:20px;padding:2px 9px}
  .ckg-name{font-family:"Noto Serif SC",serif;font-weight:700;font-size:15px;color:var(--ink)}
  .ckg-head .sp{flex:1}
  .ckg-count{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--faint)}

  .ckitem{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-sm);margin-bottom:9px;overflow:hidden}
  .ckitem .ck-row{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;cursor:pointer}
  .ckbox{width:23px;height:23px;border-radius:7px;border:1.7px solid var(--line);display:grid;place-items:center;color:transparent;flex:none;margin-top:1px;transition:.15s}
  .ckitem.got .ckbox{background:var(--c);border-color:var(--c);color:#fff}
  .ckbox .ic{font-size:15px;stroke-width:2.4}
  .ck-label{flex:1;font-size:14px;line-height:1.5;color:var(--ink);text-wrap:pretty}
  .ckitem.got .ck-label{color:var(--muted)}
  .ck-notebtn{flex:none;width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:var(--card2);color:var(--faint);display:grid;place-items:center;cursor:pointer;font-size:14px;margin-top:-2px}
  .ck-notebtn.has{color:var(--gold);background:var(--gold-soft);border-color:transparent}
  .ck-note{display:none;padding:0 14px 13px 48px}
  .ck-note.open{display:block}
  .ck-note textarea{width:100%;border:1px solid var(--line);border-radius:9px;background:var(--card2);color:var(--ink);font-size:13.5px;line-height:1.55;padding:9px 11px;resize:none;min-height:42px;outline:none;overflow:hidden}
  .ck-note textarea:focus{border-color:var(--c);background:var(--card)}

  /* ---- scoring ---- */
  .scoreboard{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px 16px;margin-bottom:16px;text-align:center}
  .scoreboard .sb-avg{font-family:"Noto Serif SC",serif;font-weight:900;font-size:54px;line-height:1;color:var(--teal)}
  .scoreboard .sb-avg small{font-size:18px;color:var(--muted);font-weight:700;margin-left:3px}
  .scoreboard .sb-lab{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:7px}
  .scoreboard .sb-bar{display:flex;gap:4px;margin-top:13px;justify-content:center}
  .scoreboard .sb-bar i{width:26px;height:6px;border-radius:3px;background:var(--line)}
  .scoreboard .sb-bar i.f{background:var(--teal)}

  .srow{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow-sm);padding:13px 15px;margin-bottom:11px}
  .srow .s-name{font-family:"Noto Serif SC",serif;font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:9px}
  .srow .s-name .sdot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex:none}
  .srow .s-sig{font-size:12px;color:var(--muted);line-height:1.5;margin:5px 0 11px;text-wrap:pretty}
  .sscale{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
  .sscale button{border:1px solid var(--line);background:var(--card2);color:var(--muted);border-radius:9px;padding:9px 0;font-family:"JetBrains Mono",monospace;font-size:16px;font-weight:600;cursor:pointer;transition:.13s}
  .sscale button:active{transform:scale(.93)}
  .sscale button.on{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 2px 8px rgba(19,122,109,.3)}
  .sscale-ends{display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:9.5px;color:var(--faint);margin-top:6px;padding:0 2px}

  .concl{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--plum);border-radius:13px;box-shadow:var(--shadow-sm);padding:15px;margin:16px 0 11px}
  .concl .c-k{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--plum);margin-bottom:4px}
  .concl h3{font-family:"Noto Serif SC",serif;font-size:16px;font-weight:700;margin-bottom:12px}
  .cseg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .cseg button{border:1px solid var(--line);background:var(--card2);color:var(--ink2);border-radius:10px;padding:11px 4px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.13s;font-family:"Noto Serif SC",serif}
  .cseg button:active{transform:scale(.95)}
  .cseg button.on{background:var(--plum);border-color:var(--plum);color:#fff}
  .cseg button[data-v="暂不适合"].on{background:var(--gray);border-color:var(--gray)}

  .overall{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow-sm);padding:14px 15px;margin-bottom:8px}
  .overall label{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);display:flex;align-items:center;gap:7px;margin-bottom:9px}
  .overall textarea{width:100%;border:1px solid var(--line);border-radius:9px;background:var(--card2);color:var(--ink);font-size:14px;line-height:1.6;padding:10px 12px;resize:none;min-height:80px;outline:none;overflow:hidden}
  .overall textarea:focus{border-color:var(--teal);background:var(--card)}

  /* ---- bottom nav ---- */
  .bnav{position:sticky;bottom:0;z-index:30;height:var(--navH);background:rgba(245,244,239,.94);backdrop-filter:blur(12px);
        border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);padding-bottom:env(safe-area-inset-bottom)}
  .bnav button{border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--faint);transition:.15s;position:relative}
  .bnav button .ic{font-size:21px}
  .bnav button .bl{font-size:10.5px;font-weight:500;letter-spacing:.02em}
  .bnav button.on{color:var(--gold)}
  .bnav button.on::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:3px;border-radius:0 0 3px 3px;background:var(--gold)}
  .bnav button .nbadge{position:absolute;top:9px;left:calc(50% + 11px);font-family:"JetBrains Mono",monospace;font-size:9px;font-weight:600;color:#fff;background:var(--teal);border-radius:10px;padding:1px 5px;min-width:16px;text-align:center;line-height:1.4}

  /* ---- bottom sheet (menu) ---- */
  .scrim{position:fixed;inset:0;background:rgba(28,26,20,.34);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.22s;z-index:50}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(102%);width:100%;max-width:540px;z-index:60;
         background:var(--card);border-radius:18px 18px 0 0;box-shadow:0 -16px 50px rgba(40,38,30,.18);transition:.28s cubic-bezier(.34,.1,.2,1);padding:8px 16px calc(20px + env(safe-area-inset-bottom))}
  .sheet.open{transform:translateX(-50%) translateY(0)}
  .sheet .grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:6px auto 12px}
  .sheet .sh-ttl{font-family:"Noto Serif SC",serif;font-weight:700;font-size:16px;margin:0 4px 12px;display:flex;align-items:center;gap:9px}
  .sheet .sh-ttl .cnt{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:400;color:var(--faint)}
  .menurow{display:flex;align-items:center;gap:13px;padding:14px 8px;border-top:1px solid var(--line2);cursor:pointer;font-size:14.5px;color:var(--ink);transition:.13s}
  .menurow:active{background:var(--paper2)}
  .menurow .mi{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:19px;color:var(--gold);background:var(--gold-soft);flex:none}
  .menurow.teal .mi{color:var(--teal);background:var(--teal-soft)}
  .menurow.danger{color:var(--danger)} .menurow.danger .mi{color:var(--danger);background:#f6e6e1}
  .menurow .mt{flex:1} .menurow .mt small{display:block;font-size:11.5px;color:var(--faint);margin-top:1px;font-weight:400}
  .menurow .ic.chev{color:var(--faint);font-size:17px}

  /* ---- toast ---- */
  .toast{position:fixed;bottom:calc(var(--navH) + 16px);left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:var(--paper);
         font-size:13px;padding:11px 19px;border-radius:11px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:70;display:flex;align-items:center;gap:9px;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .ic{color:var(--teal);font-size:16px}

  .empty{text-align:center;color:var(--faint);font-size:13px;padding:40px 20px}
</style>
</head>
<body>

<!-- ===== ICON SPRITE ===== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-aim" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.4"/><path d="M12 2v3.5M12 18.5V22M2 12h3.5M18.5 12H22"/></symbol>
  <symbol id="i-chat" viewBox="0 0 24 24"><path d="M4 5.5h16v10H9l-4 3.5v-3.5H4z"/><path d="M8 9h8M8 12h5"/></symbol>
  <symbol id="i-cart" viewBox="0 0 24 24"><path d="M3 4h2.2l1.8 11h10l2-8H6.2"/><circle cx="9" cy="19" r="1.4"/><circle cx="16" cy="19" r="1.4"/></symbol>
  <symbol id="i-list" viewBox="0 0 24 24"><path d="M8 6h12M8 12h12M8 18h12"/><path d="M4 6h.01M4 12h.01M4 18h.01"/></symbol>
  <symbol id="i-doc" viewBox="0 0 24 24"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M9 13h6M9 16.5h4"/></symbol>
  <symbol id="i-value" viewBox="0 0 24 24"><path d="M12 3 L19.5 6 V11 C19.5 16 16 19.5 12 21 C8 19.5 4.5 16 4.5 11 V6 Z"/><path d="M9 12 L11 14 L15.5 9.5"/></symbol>
  <symbol id="i-server" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="6.5" rx="1.5"/><rect x="4" y="13.5" width="16" height="6.5" rx="1.5"/><path d="M7.5 7.2h.01M7.5 16.7h.01"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M4.5 12.5 L9.5 17.5 L19.5 6.5"/></symbol>
  <symbol id="i-star" viewBox="0 0 24 24"><path d="M12 3.2l2.6 5.7 6.2.6-4.7 4.1 1.4 6.1L12 16.6 6.5 19.8l1.4-6.1L3.2 9.5l6.2-.6z"/></symbol>
  <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.4"/><path d="M12 7.5V12l3 2"/></symbol>
  <symbol id="i-play" viewBox="0 0 24 24"><path d="M7 5l11 7-11 7z"/></symbol>
  <symbol id="i-pause" viewBox="0 0 24 24"><path d="M8 5v14M16 5v14"/></symbol>
  <symbol id="i-reset" viewBox="0 0 24 24"><path d="M4 12 A8 8 0 1 1 6.5 17.8"/><path d="M4 7 L4 12 L9 12"/></symbol>
  <symbol id="i-clipboard" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="16" rx="2"/><path d="M9 5V3.5h6V5"/><path d="M9 11l1.5 1.5L13 10M9 16l1.5 1.5L13 15"/></symbol>
  <symbol id="i-gauge" viewBox="0 0 24 24"><path d="M4 17 A8 8 0 0 1 20 17"/><path d="M12 17 L16 10"/><circle cx="12" cy="17" r="1.4"/></symbol>
  <symbol id="i-download" viewBox="0 0 24 24"><path d="M12 4v11M7.5 10.5 L12 15 L16.5 10.5"/><path d="M5 19h14"/></symbol>
  <symbol id="i-copy" viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></symbol>
  <symbol id="i-dots" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></symbol>
  <symbol id="i-pencil" viewBox="0 0 24 24"><path d="M14.5 5.5 L18.5 9.5 L8 20 L4 20 L4 16 Z"/><path d="M12.5 7.5 L16.5 11.5"/></symbol>

  <symbol id="i-x" viewBox="0 0 24 24"><path d="M6 6 L18 18 M18 6 L6 18"/></symbol>

<div class="app">
  <!-- top bar -->
  <div class="top">
    <span class="mk">傲虎 · 走访</span>
    <div class="ttl">访谈记录卡<small>aohu field interview</small></div>
    <div class="sp"></div>
    <button class="iconbtn" id="btnExportTop" title="导出记录"><svg class="ic"><use href="#i-download"/></svg></button>
    <button class="iconbtn" id="btnMenu" title="菜单"><svg class="ic"><use href="#i-dots"/></svg></button>
  </div>

  <!-- session meta -->
  <div class="meta">
    <span class="mlab">受访</span>
    <input id="mWho" type="text" placeholder="姓名 / 角色，如 张工 · 业务员">
    <span class="mdiv"></span>
    <input id="mDate" class="mdate" type="date">
  </div>

  <!-- panel 1: 访谈 -->
  <div class="panel-view on" id="view-ask">
    <div class="rolescroll" id="roleScroll"></div>
    <div id="askBody"></div>
  </div>

  <!-- panel 2: 盘点 -->
  <div class="panel-view" id="view-check">
    <div class="secthead">
      <span class="sh-ic"><svg class="ic"><use href="#i-clipboard"/></svg></span>
      <div><div class="sh-k">03 · Data & System Inventory</div>
      <h2>数据与系统盘点</h2>
      <div class="sh-s">现场打勾——能拿到的素材、读权限、数据结构。勾选后可在右侧记一笔（样本在哪、数据量、卡点）。</div></div>
    </div>
    <div id="checkBody"></div>
  </div>

  <!-- panel 3: 评分 -->
  <div class="panel-view" id="view-score">
    <div class="secthead">
      <span class="sh-ic" style="color:var(--teal);background:var(--teal-soft)"><svg class="ic"><use href="#i-gauge"/></svg></span>
      <div><div class="sh-k">04 · Pilot Fit Assessment</div>
      <h2>试点适配度评分</h2>
      <div class="sh-s">走访结束当场打分，1–5，<b>越高越利好</b>。六维打完得平均分，再下结论。</div></div>
    </div>
    <div id="scoreBoard"></div>
    <div id="scoreBody"></div>
    <div class="concl">
      <div class="c-k">Conclusion · 结论</div>
      <h3>傲虎做——</h3>
      <div class="cseg" id="conclSeg"></div>
    </div>
    <div class="overall">
      <label><svg class="ic"><use href="#i-pencil"/></svg> 总评 · 一句话给凯越的建议</label>
      <textarea id="overallNote" placeholder="例如：第一刀建议从报价切——最疼、也最容易一起跑出数据。"></textarea>
    </div>
  </div>

  <!-- bottom nav -->
  <div class="bnav">
    <button class="on" data-view="ask"><svg class="ic"><use href="#i-chat"/></svg><span class="bl">访谈</span><span class="nbadge" id="badgeAsk" style="display:none">0</span></button>
    <button data-view="check"><svg class="ic"><use href="#i-clipboard"/></svg><span class="bl">盘点</span><span class="nbadge" id="badgeCheck" style="display:none">0</span></button>
    <button data-view="score"><svg class="ic"><use href="#i-gauge"/></svg><span class="bl">评分</span></button>
  </div>
</div>

<!-- menu sheet -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div class="sh-ttl"><svg class="ic" style="color:var(--gold)"><use href="#i-flag"/></svg> 走访记录<span class="cnt" id="sheetStat"></span></div>
  <div class="menurow teal" id="mExport"><span class="mi"><svg class="ic"><use href="#i-download"/></svg></span><div class="mt">导出记录 .md<small>带走全部访谈 / 盘点 / 评分</small></div><svg class="ic chev"><use href="#i-chev"/></svg></div>
  <div class="menurow" id="mCopy"><span class="mi"><svg class="ic"><use href="#i-copy"/></svg></span><div class="mt">复制到剪贴板<small>粘进微信 / 备忘录</small></div><svg class="ic chev"><use href="#i-chev"/></svg></div>
  <div class="menurow danger" id="mReset"><span class="mi"><svg class="ic"><use href="#i-trash"/></svg></span><div class="mt">清空本次走访<small>仅清除本机记录，不可撤销</small></div><svg class="ic chev"><use href="#i-chev"/></svg></div>
</div>

<div class="toast" id="toast"><svg class="ic"><use href="#i-check"/></svg><span id="toastMsg">已保存</span></div>

<script src="visit-data.js"></script>
<script src="visit-app.js"></script>
</body>
</html>
